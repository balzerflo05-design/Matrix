<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Veranstaltungs‑Matrix</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        rel="stylesheet">

  <style>
    :root{
      --brand:#0d6efd;
      --bg:#eef1f5;
      --card-bg:#fff;
      --text:#223047;
      --muted:#6b7a90;
      --shadow:0 4px 20px rgba(0,0,0,.06);
    }
    html,body{height:100%}
    body{background:var(--bg); color:var(--text)}
    .container{max-width:1100px}
    .form-label{font-weight:600}
    .app-title{font-weight:800; letter-spacing:.2px}
    .card{border:0; border-radius:16px; background:var(--card-bg); box-shadow:var(--shadow)}
    .step-card{padding:1.5rem}
    .nav-tabs .nav-link{font-weight:600}
    .nav-tabs .nav-link:not(.active){color:var(--muted)}
    .required::after{content:" *"; color:#d00; font-weight:700}
    .form-grid .col-md-6{margin-bottom:1rem}
    .result-hero{display:flex; align-items:center; justify-content:center; padding:3rem 0}
    .result-box{
      width:min(420px,90%); border-radius:20px; padding:2.5rem;
      background:linear-gradient(135deg,#ffffff 0%,#f5f8ff 100%);
      border:2px solid #0d6efd1f; box-shadow:var(--shadow); text-align:center;
    }
    .result-value{font-size:3.25rem; font-weight:800; letter-spacing:.5px}
    .result-sub{color:var(--muted)}
    .missing-list{max-height:40vh; overflow:auto}
  </style>
</head>
<body>

<div class="container py-5">
  <h1 class="app-title mb-2"><i class="bi bi-grid-3x3-gap-fill me-2 text-primary"></i>Veranstaltungs‑Matrix</h1>
  <p class="text-muted mb-4">Bitte nacheinander alle Felder ausfüllen. Das Ergebnis wird am Ende angezeigt.</p>

  <!-- Fortschritt -->
  <div class="mb-3">
    <div class="d-flex justify-content-between small mb-1">
      <span class="text-muted">Fortschritt</span>
      <span class="text-muted" id="progress_text">0%</span>
    </div>
    <div class="progress">
      <div class="progress-bar bg-primary" role="progressbar" id="progress_bar" style="width:0%"></div>
    </div>
  </div>

  <!-- Tabs mit Icons -->
  <ul class="nav nav-tabs mt-4" id="mainTabs" role="tablist">
    <li class="nav-item">
      <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-grunddaten" type="button">
        <i class="bi bi-clipboard2 me-1"></i>Grunddaten
      </button>
    </li>
    <li class="nav-item">
      <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-gelaende" type="button">
        <i class="bi bi-geo me-1"></i>Veranstaltungsgelände
      </button>
    </li>
    <li class="nav-item">
      <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-gestalt" type="button">
        <i class="bi bi-diagram-3 me-1"></i>Gestalt
      </button>
    </li>
    <li class="nav-item">
      <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-beschaffenheit" type="button">
        <i class="bi bi-building-gear me-1"></i>Beschaffenheit
      </button>
    </li>
    <li class="nav-item">
      <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-verlauf" type="button">
        <i class="bi bi-clock-history me-1"></i>Veranstaltungsverlauf
      </button>
    </li>
    <li class="nav-item">
      <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-wiederkehr" type="button">
        <i class="bi bi-arrow-repeat me-1"></i>Wiederkehr
      </button>
    </li>
    <li class="nav-item">
      <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-verhalten" type="button">
        <i class="bi bi-people me-1"></i>Besuchendenverhalten
      </button>
    </li>
    <li class="nav-item ms-auto">
      <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-ergebnis" type="button">
        <i class="bi bi-graph-up-arrow me-1"></i>Ergebnis
      </button>
    </li>
  </ul>

  <form class="mt-4" id="matrixForm">
    <div class="tab-content">

      <!-- GRUNDDATEN -->
      <div class="tab-pane fade show active" id="tab-grunddaten">
        <div class="card step-card">
          <div class="row form-grid">
            <div class="col-md-6">
              <label class="form-label" for="grunddaten_veranstaltungsname">Veranstaltungsname</label>
              <input id="grunddaten_veranstaltungsname" name="grunddaten_veranstaltungsname" class="form-control" type="text">
            </div>
            <div class="col-md-6">
              <label class="form-label required" for="grunddaten_personenzahl"
                     data-bs-toggle="tooltip" title="Erwartete Anzahl gleichzeitig anwesender Personen auf dem Veranstaltungsgelände">
                Personenzahl
              </label>
              <input id="grunddaten_personenzahl" name="grunddaten_personenzahl"
                     class="form-control" type="number" min="0" value="0" required>
            </div>
          </div>
        </div>
      </div>

      <!-- VERANSTALTUNGSGELÄNDE -->
      <div class="tab-pane fade" id="tab-gelaende">
        <div class="card step-card">
          <div class="row form-grid">

            <div class="col-md-6">
              <label class="form-label required" for="veranstaltungsgelaende_flaechenverhaeltnis">Flächenverhältnis</label>
              <select id="veranstaltungsgelaende_flaechenverhaeltnis" class="form-select" required>
                <option value="">Bitte wählen…</option>
                <option value="1.0">
                  Die für Besuchenden zugängliche Fläche entspricht der erwarteten Besucherzahl
                  bei einer Belegungsdichte von 2 Personen pro Quadratmeter; geordneter Personenfluss.
                </option>
                <option value="0.9">
                  Die zugängliche Fläche ist um mehr als 20 % größer als die bei 2 Pers./m²
                  erforderliche Fläche; mehr Bewegungsfreiheit, weniger Verdichtung.
                </option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label required" for="veranstaltungsgelaende_verkehrsstaerke">Personenverkehrsstärke (qs)</label>
              <select id="veranstaltungsgelaende_verkehrsstaerke" class="form-select" required>
                <option value="">Bitte wählen…</option>
                <option value="0.9">
                  Die erwartete spezifische Personenverkehrsstärke (qs) beträgt ≤ 0,7 Pers./ms
                  (z. B. auf An-/Abreisewegen oder Teilflächen). Überwiegend störungsfrei.
                </option>
                <option value="1.0">
                  Die erwartete spezifische Personenverkehrsstärke (qs) beträgt ≤ 1,3 Pers./ms.
                  Normale bis leicht erhöhte Auslastung.
                </option>
                <option value="1.1">
                  Die erwartete spezifische Personenverkehrsstärke (qs) überschreitet 1,3 Pers./ms.
                  Temporäre Verdichtungen möglich.
                </option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label required" for="veranstaltungsgelaende_stoerungen">Störungen auf Flucht‑ und Rettungswegen</label>
              <select id="veranstaltungsgelaende_stoerungen" class="form-select" required>
                <option value="">Bitte wählen…</option>
                <option value="1.2">
                  Störungen (z. B. gegenläufige Ströme, parallele Nutzungen oder Änderungen
                  im Veranstaltungsverlauf) sind wahrscheinlich.
                </option>
                <option value="1.0">
                  Störungen auf den Flucht‑ und Rettungswegen sind unwahrscheinlich; die
                  Wegeführung dürfte ohne wesentliche Einschränkungen funktionieren.
                </option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label required" for="veranstaltungsgelaende_wegfuehrung">Wegführung</label>
              <select id="veranstaltungsgelaende_wegfuehrung" class="form-select" required>
                <option value="">Bitte wählen…</option>
                <option value="1.2">
                  Bauliche Anlagen und/oder topografische Gegebenheiten bedingen eine
                  unübersichtliche Wegführung; Orientierung erschwert.
                </option>
                <option value="1.0">
                  Bauliche Anlagen und/oder topografische Gegebenheiten erlauben eine
                  übersichtliche Wegführung; gute Orientierung.
                </option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label required" for="veranstaltungsgelaende_einlass_auslass">Einlass / Auslass</label>
              <select id="veranstaltungsgelaende_einlass_auslass" class="form-select" required>
                <option value="">Bitte wählen…</option>
                <option value="1.0">
                  Ein‑ und Auslass sind räumlich getrennt; klare Strömungsrichtungen
                  unterstützen einen geordneten Ablauf.
                </option>
                <option value="1.1">
                  Ein‑ und Auslass sind räumlich nicht getrennt; Begegnungsströme können
                  den Ablauf verlangsamen.
                </option>
              </select>
            </div>

          </div>
        </div>
      </div>

      <!-- GESTALT -->
      <div class="tab-pane fade" id="tab-gestalt">
        <div class="card step-card">
          <div class="row form-grid">
            <div class="col-md-6">
              <label class="form-label required" for="gestalt_grundform">Grundform der Veranstaltungsfläche</label>
              <select id="gestalt_grundform" class="form-select" required>
                <option value="">Bitte wählen…</option>
                <option value="1.0">
                  Muster: Szenen‑/Attraktionsfläche und Publikumsfläche sind getrennt;
                  das unterstützt eine geordnete Besucherführung.
                </option>
                <option value="1.1">
                  Vieleck: mehrere Szenen/Attraktionen mit wechselnden Besucherströmen;
                  komplexere Bewegungsmuster möglich.
                </option>
                <option value="1.2">
                  Aufzug: veränderliche Szenenfläche/Attraktion bei überwiegend statischer
                  Publikumsfläche; Treffpunkte können sich im Verlauf verlagern.
                </option>
                <option value="1.3">
                  Marktplatz: keine Trennung von Szenen‑/Attraktionsfläche und Publikumsfläche;
                  offene, frei gestaltete Bewegungsflächen.
                </option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <!-- BESCHAFFENHEIT -->
      <div class="tab-pane fade" id="tab-beschaffenheit">
        <div class="card step-card">
          <div class="row form-grid">

            <div class="col-md-6">
              <label class="form-label required" for="beschaffenheit_entlastungsflaechen"
                     data-bs-toggle="tooltip" title="Zusätzliche Flächen, auf die sich Besuchendenströme bei Bedarf verteilen können.">
                Möglichkeit zur Einrichtung von Entlastungsflächen
              </label>
              <select id="beschaffenheit_entlastungsflaechen" class="form-select" required>
                <option value="">Bitte wählen…</option>
                <option value="1.0">
                  Es bestehen Möglichkeiten zur Einrichtung von Entlastungsflächen; dadurch können
                  Besuchendenströme im Bedarfsfall gezielt entzerrt werden.
                </option>
                <option value="1.1">
                  Es bestehen keine realistischen Möglichkeiten für Entlastungsflächen; Ausweichräume
                  sind begrenzt.
                </option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label required" for="beschaffenheit_befestigung"
                     data-bs-toggle="tooltip" title="Relevanz für Zugänglichkeit, Logistik und Einsatzfahrzeuge.">
                Befestigter Grund mit befahrbaren Wegen
              </label>
              <select id="beschaffenheit_befestigung" class="form-select" required>
                <option value="">Bitte wählen…</option>
                <option value="1.0">
                  Der Untergrund ist befestigt und befahrbar; Logistik und Einsatzfahrzeuge
                  können sich zuverlässig bewegen.
                </option>
                <option value="1.1">
                  Der Untergrund ist nicht befestigt; Mobilität und Zugänglichkeit können
                  eingeschränkt sein (insbesondere bei Nässe).
                </option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label required" for="beschaffenheit_wetterlage"
                     data-bs-toggle="tooltip" title="Einfluss von Regen, Wind, Bodenbeschaffenheit u. Ä.">
                Wetterlage
              </label>
              <select id="beschaffenheit_wetterlage" class="form-select" required>
                <option value="">Bitte wählen…</option>
                <option value="1.3">
                  Die Wetterlage kann die Nutzbarkeit des Geländes stark beeinflussen
                  (z. B. durch Regen, Wind oder aufgeweichten Boden).
                </option>
                <option value="1.0">
                  Die Wetterlage beeinflusst die Nutzbarkeit des Geländes nicht in relevantem Maß.
                </option>
              </select>
            </div>

          </div>
        </div>
      </div>

      <!-- VERANSTALTUNGSVERLAUF -->
      <div class="tab-pane fade" id="tab-verlauf">
        <div class="card step-card">
          <div class="row form-grid">

            <div class="col-md-6">
              <label class="form-label required" for="veranstaltungsverlauf_einlasskontrolle">Einlasskontrolle</label>
              <select id="veranstaltungsverlauf_einlasskontrolle" class="form-select" required>
                <option value="">Bitte wählen…</option>
                <option value="1.3">
                  Es erfolgt keine Einlasskontrolle; der Zugang ist frei und unreguliert
                  (schnelleres Einströmen, jedoch weniger Steuerung).
                </option>
                <option value="1.0">
                  Es erfolgt eine Einlasskontrolle; der Eintritt ist geordnet, zeitweise können
                  Wartezonen entstehen.
                </option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label required" for="veranstaltungsverlauf_zuablauf">Zu‑ und Ablauf bei Ein‑/Auslass</label>
              <select id="veranstaltungsverlauf_zuablauf" class="form-select" required>
                <option value="">Bitte wählen…</option>
                <option value="1.0">
                  Der Zu‑ und Ablauf erfolgt kontinuierlich; gleichmäßige Personenströme sind zu erwarten.
                </option>
                <option value="1.3">
                  Der Zu‑ und Ablauf erfolgt in einem oder mehreren Schüben; zeitweise Verdichtungen
                  sind möglich.
                </option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label required" for="veranstaltungsverlauf_attraktionen">Attraktionen / Bühnen</label>
              <select id="veranstaltungsverlauf_attraktionen" class="form-select" required>
                <option value="">Bitte wählen…</option>
                <option value="1.2">
                  Es existieren mehrere Attraktionen bzw. Bühnen; die Ströme verteilen sich,
                  bleiben aber dynamisch.
                </option>
                <option value="1.0">
                  Es existiert nur eine Attraktion bzw. Bühne; der Personenfluss konzentriert sich
                  stärker auf einen Bereich.
                </option>
              </select>
            </div>

          </div>
        </div>
      </div>

      <!-- WIEDERKEHR -->
      <div class="tab-pane fade" id="tab-wiederkehr">
        <div class="card step-card">
          <div class="row form-grid">

            <div class="col-md-6">
              <label class="form-label required" for="wiederkehrende_veranstaltung_erfahrung">Erfahrung des Veranstaltenden</label>
              <select id="wiederkehrende_veranstaltung_erfahrung" class="form-select" required>
                <option value="">Bitte wählen…</option>
                <option value="1.0">
                  Die Veranstaltung ist wiederkehrend; Veranstaltende, Veranstaltungsort und
                  Veranstaltungsablauf sind gleichbleibend (Prozesse sind erprobt).
                </option>
                <option value="5.0">
                  Die Veranstaltung findet mit dem aktuellen Ablauf erstmalig an diesem Ort statt;
                  Veranstaltende verfügen über Erfahrung mit vergleichbaren Veranstaltungen.
                </option>
                <option value="10.0">
                  Die Veranstaltung findet erstmalig an diesem Ort statt; Veranstaltende verfügen
                  bislang nicht über vergleichbare Erfahrung.
                </option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label required" for="wiederkehrende_veranstaltung_stoerungen">Historische Störungen</label>
              <select id="wiederkehrende_veranstaltung_stoerungen" class="form-select" required>
                <option value="">Bitte wählen…</option>
                <option value="0.0">
                  Bei früheren Veranstaltungen kam es zu keinen dokumentierten Störungen.
                  Anzahl und Umfang der Einsätze entsprachen den gängigen Einsatzzahlen.
                </option>
                <option value="5.0">
                  Bei früheren Veranstaltungen kam es zu dokumentierten Störungen.
                  Anzahl und Umfang der Einsätze entsprachen nicht den gängigen Einsatzzahlen.
                </option>
              </select>
            </div>

          </div>
        </div>
      </div>

      <!-- BESUCHENDENVERHALTEN -->
      <div class="tab-pane fade" id="tab-verhalten">
        <div class="card step-card">
          <div class="row form-grid">

            <div class="col-md-6">
              <label class="form-label required" for="besuchendenverhalten_ort_ablauf">Ortskenntnis & Ablaufkenntnis</label>
              <select id="besuchendenverhalten_ort_ablauf" class="form-select" required>
                <option value="">Bitte wählen…</option>
                <option value="0.8">
                  Die Mehrheit der erwarteten Besuchenden ist ortskundig; der Veranstaltungsablauf
                  ist den Besuchenden bekannt.
                </option>
                <option value="1.2">
                  Die Mehrheit der erwarteten Besuchenden ist ortsunkundig.
                </option>
                <option value="1.3">
                  Die Mehrheit der erwarteten Besuchenden ist ortskundig; der Veranstaltungsablauf
                  ist den Besuchenden unbekannt.
                </option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label required" for="besuchendenverhalten_involvement">Involvement (Bindung/Engagement)</label>
              <select id="besuchendenverhalten_involvement" class="form-select" required>
                <option value="">Bitte wählen…</option>
                <option value="1.2">
                  Ein größerer Anteil der erwarteten Besuchenden hat ein hohes Involvement
                  (aktivere Teilnahme/Bewegung möglich).
                </option>
                <option value="1.0">
                  Nur ein kleiner Anteil der erwarteten Besuchenden hat ein hohes Involvement;
                  das Gesamtverhalten bleibt eher ruhig.
                </option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label required" for="besuchendenverhalten_soziale_gruppen">Besondere soziale Gruppen</label>
              <select id="besuchendenverhalten_soziale_gruppen" class="form-select" required>
                <option value="">Bitte wählen…</option>
                <option value="1.2">
                  Besondere soziale Gruppen sind zu erwarten, die die durchschnittliche
                  Bewegungsgeschwindigkeit verändern (z. B. Jugendgruppen, Senior:innen, Familien).
                </option>
                <option value="1.0">
                  Es sind keine besonderen sozialen Gruppen zu erwarten; die durchschnittliche
                  Bewegungsgeschwindigkeit bleibt voraussichtlich normal.
                </option>
              </select>
            </div>

          </div>
        </div>
      </div>

      <!-- ERGEBNIS -->
      <div class="tab-pane fade" id="tab-ergebnis">
        <div class="result-hero">
          <div class="result-box">
            <div class="result-sub mb-2">Berechnetes Ergebnis</div>
            <div class="result-value" id="ergebnis_feld">0.00</div>
          </div>
        </div>
      </div>

    </div>

    <div class="d-flex gap-2 mt-3">
      <button class="btn btn-outline-secondary btn-sm" type="reset">
        <i class="bi bi-arrow-counterclockwise me-1"></i>Zurücksetzen
      </button>
      <button class="btn btn-primary ms-auto" type="submit">
        <i class="bi bi-check2-circle me-1"></i>Absenden
      </button>
    </div>
  </form>
</div>

<!-- Modal Fehlende Angaben -->
<div class="modal fade" id="validationModal" tabindex="-1" aria-labelledby="validationModalLabel" aria-hidden="true">
  <div class="modal-dialog"><div class="modal-content">
    <div class="modal-header">
      <h5 class="modal-title" id="validationModalLabel">Es fehlen Angaben</h5>
      <button class="btn-close" data-bs-dismiss="modal" aria-label="Schließen"></button>
    </div>
    <div class="modal-body">
      Bitte treffen Sie zunächst in allen Pflichtfeldern eine Auswahl:
      <ul class="missing-list mt-3" id="missingList"></ul>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" data-bs-dismiss="modal">OK</button>
    </div>
  </div></div>
</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

<!-- SCRIPT (Variante A + Wizard + Optik) -->
<script>
(() => {
  const get = (id) => document.getElementById(id);
  const $$  = (sel, root=document) => Array.from(root.querySelectorAll(sel));

  function factor(id){
    const v = parseFloat(get(id)?.value);
    return Number.isFinite(v) ? v : null;
  }

  const product = (ids) => ids.reduce((a,id)=>a*(factor(id) ?? 1), 1);
  const sum     = (ids) => ids.reduce((a,id)=>a+(factor(id) ?? 0), 0);

  // Personenfaktor: 0 → 1, sonst log2(n)
  function person(){
    const n = parseFloat(get("grunddaten_personenzahl").value);
    return (!Number.isFinite(n) || n <= 0) ? 1 : Math.log2(n);
  }

  // Kategorien
  const VG = [
    "veranstaltungsgelaende_flaechenverhaeltnis",
    "veranstaltungsgelaende_verkehrsstaerke",
    "veranstaltungsgelaende_stoerungen",
    "veranstaltungsgelaende_wegfuehrung",
    "veranstaltungsgelaende_einlass_auslass"
  ];
  const G  = [ "gestalt_grundform" ];
  const B  = [ "beschaffenheit_entlastungsflaechen", "beschaffenheit_befestigung", "beschaffenheit_wetterlage" ];
  const VV = [ "veranstaltungsverlauf_einlasskontrolle", "veranstaltungsverlauf_zuablauf", "veranstaltungsverlauf_attraktionen" ];
  const BV = [ "besuchendenverhalten_ort_ablauf", "besuchendenverhalten_involvement", "besuchendenverhalten_soziale_gruppen" ];
  const EW = [ "wiederkehrende_veranstaltung_erfahrung", "wiederkehrende_veranstaltung_stoerungen" ];

  function calc(){
    const left  = person() * product(VG) * product(G) * product(B) * product(VV);
    const right = sum(EW) * product(BV);
    const res   = left + right;
    get("ergebnis_feld").textContent = res.toFixed(2);
  }

  // Variante A: Number(0) = nicht ausgefüllt
  function getMissing(){
    const req = $$("select[required], input[required]");
    return req.filter(el => {
      if (el.tagName === "INPUT" && el.type === "number"){
        const v = parseFloat(el.value);
        return (!Number.isFinite(v) || v <= 0);
      }
      return (!el.value || el.value === "");
    });
  }

  function requiredFields(){
    return $$("select[required], input[required]");
  }

  function updateProgress(){
    const req = requiredFields();
    const missing = getMissing();
    const filled = req.length - missing.length;
    const pct = req.length ? Math.round(100 * filled / req.length) : 0;
    get("progress_bar").style.width = pct + "%";
    get("progress_text").textContent = pct + "%";
  }

  function showMissingModal(missing){
    const list = get("missingList");
    list.innerHTML = "";
    missing.forEach(el => {
      const lab = document.querySelector(`label[for="${el.id}"]`)?.innerText || el.id;
      const li = document.createElement("li");
      li.textContent = lab.replace(/\s*\*$/, "").trim();
      list.appendChild(li);
    });
    new bootstrap.Modal(get("validationModal")).show();
  }

  const form = get("matrixForm");

  // Live calc + validation
  form.addEventListener("change", (e) => {
    if (e.target.tagName === "SELECT" || e.target.type === "number") {
      const v = e.target.value;
      e.target.classList.remove("is-valid","is-invalid");

      if (e.target.type === "number") {
        const n = parseFloat(v);
        e.target.classList.add(n > 0 ? "is-valid" : "is-invalid");
      } else {
        e.target.classList.add(v ? "is-valid" : "is-invalid");
      }

      calc();
      updateProgress();
    }
  });

  // Ergebnis-Tab nur, wenn vollständig
  get("mainTabs").addEventListener("show.bs.tab", (e) => {
    const tgt = e.target.getAttribute("data-bs-target");
    if (tgt === "#tab-ergebnis") {
      const missing = getMissing();
      if (missing.length > 0) {
        e.preventDefault();
        showMissingModal(missing);
      } else {
        calc();
      }
    }
  });

  // RESET — FIXED: 1-Klick, korrektes Reset
  form.addEventListener("reset", () => {

    get("ergebnis_feld").textContent = "0.00";

    document.querySelectorAll("select,input")
      .forEach(el => el.classList.remove("is-valid","is-invalid"));

    // Wichtig: erst nach Browser-Reset Fortschritt neu berechnen
    setTimeout(() => {
      updateProgress();
    }, 0);

  });

  // Tooltips
  document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(el => new bootstrap.Tooltip(el));

  // Initial
  updateProgress();
})();
</script>

document.getElementById('matrixForm').addEventListener('submit', (e) => {
  e.preventDefault();
});
</script>
