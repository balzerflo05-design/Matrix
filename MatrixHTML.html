<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Veranstaltungs‑Matrix</title>

  <!-- Bootstrap 5 (CSS) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">

  <style>
    body { background:#f6f7fb; }
    .tab-content { margin-top: 1rem; }
    .card { border:0; box-shadow:0 4px 20px rgba(0,0,0,.05); border-radius:16px; }
    .form-label { font-weight:600; }
    .required::after { content:" *"; color:#d00; font-weight:600; }
    .missing-list { max-height:40vh; overflow:auto; }
  </style>
</head>
<body>

<div class="container py-5">
  <h1 class="mb-4">Veranstaltungs‑Matrix</h1>

  <!-- Tabs -->
  <ul class="nav nav-tabs" id="mainTabs" role="tablist">
    <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-grunddaten" type="button">Grunddaten</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-gelaende" type="button">Veranstaltungsgelände</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-gestalt" type="button">Gestalt</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-beschaffenheit" type="button">Beschaffenheit</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-verlauf" type="button">Veranstaltungsverlauf</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-wiederkehr" type="button">Wiederkehrende Veranstaltung</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-verhalten" type="button">Besuchendenverhalten</button></li>
    <!-- Ergebnis separat -->
    <li class="nav-item ms-auto"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-ergebnis" type="button">Ergebnis</button></li>
  </ul>

  <form class="mt-4" id="matrixForm">
    <div class="tab-content">

      <!-- Grunddaten -->
      <div class="tab-pane fade show active" id="tab-grunddaten">
        <div class="card p-4">
          <div class="mb-3">
            <label class="form-label" for="grunddaten_veranstaltungsname">Veranstaltungsname</label>
            <input id="grunddaten_veranstaltungsname" name="grunddaten_veranstaltungsname"
                   class="form-control" type="text" placeholder="">
          </div>

          <div class="mb-3">
            <label class="form-label required" for="grunddaten_personenzahl"
                   data-bs-toggle="tooltip" title="Erwartete Anzahl gleichzeitig anwesender Personen auf dem Veranstaltungsgelände">
              Personenzahl
            </label>
            <input id="grunddaten_personenzahl" name="grunddaten_personenzahl"
                   class="form-control" type="number" min="0" value="0">
          </div>
        </div>
      </div>

      <!-- Veranstaltungsgelände -->
      <div class="tab-pane fade" id="tab-gelaende">
        <div class="card p-4">

          <!-- Flächenverhältnis -->
          <div class="mb-3">
            <label class="form-label required" for="veranstaltungsgelaende_flaechenverhaeltnis">Flächenverhältnis</label>
            <select id="veranstaltungsgelaende_flaechenverhaeltnis" name="veranstaltungsgelaende_flaechenverhaeltnis" class="form-select" required>
              <option value="">Bitte wählen…</option>
              <option value="1.0">
                Die für Besuchenden zugängliche Fläche entspricht der erwarteten Besucherzahl
                bei einer Belegungsdichte von 2 Personen pro Quadratmeter. Das Verhältnis ermöglicht
                einen geordneten Personenfluss ohne zusätzliche Verdichtung.
              </option>
              <option value="0.9">
                Die für Besuchenden zugängliche Fläche ist um mehr als 20 % größer als die für die
                erwartete Besucherzahl bei 2 Pers./m² erforderliche Fläche. Dadurch verbessern sich
                die Bewegungsfreiheit und potenzielle Engstellen werden reduziert.
              </option>
            </select>
          </div>

          <!-- Personenverkehrsstärke -->
          <div class="mb-3">
            <label class="form-label required" for="veranstaltungsgelaende_verkehrsstaerke">Personenverkehrsstärke (qs)</label>
            <select id="veranstaltungsgelaende_verkehrsstaerke" name="veranstaltungsgelaende_verkehrsstaerke" class="form-select" required>
              <option value="">Bitte wählen…</option>
              <option value="0.9">
                Die erwartete spezifische Personenverkehrsstärke (qs) beträgt ≤ 0,7 Pers./ms
                (z. B. auf An-/Abreisewegen oder Teilflächen der Publikumsflächen). Die Bewegung
                kann überwiegend störungsfrei erfolgen.
              </option>
              <option value="1.0">
                Die erwartete spezifische Personenverkehrsstärke (qs) beträgt ≤ 1,3 Pers./ms.
                Es ist mit einer normalen bis leicht erhöhten Auslastung zu rechnen.
              </option>
              <option value="1.1">
                Die erwartete spezifische Personenverkehrsstärke (qs) überschreitet 1,3 Pers./ms.
                Es ist mit temporären Verdichtungen und geringerer Bewegungsfreiheit zu rechnen.
              </option>
            </select>
          </div>

          <!-- Störungen -->
          <div class="mb-3">
            <label class="form-label required" for="veranstaltungsgelaende_stoerungen">Störungen auf Flucht‑ und Rettungswegen</label>
            <select id="veranstaltungsgelaende_stoerungen" name="veranstaltungsgelaende_stoerungen" class="form-select" required>
              <option value="">Bitte wählen…</option>
              <option value="1.2">
                Störungen (z. B. durch gegenläufige Ströme, parallele Nutzungen oder Änderungen
                im Veranstaltungsverlauf) sind wahrscheinlich.
              </option>
              <option value="1.0">
                Störungen auf den Flucht‑ und Rettungswegen sind unwahrscheinlich; die Wegeführung
                dürfte ohne wesentliche Einschränkungen funktionieren.
              </option>
            </select>
          </div>

          <!-- Wegführung -->
          <div class="mb-3">
            <label class="form-label required" for="veranstaltungsgelaende_wegfuehrung">Wegführung</label>
            <select id="veranstaltungsgelaende_wegfuehrung" name="veranstaltungsgelaende_wegfuehrung" class="form-select" required>
              <option value="">Bitte wählen…</option>
              <option value="1.2">
                Bauliche Anlagen und/oder topographische Gegebenheiten bedingen eine unübersichtliche
                Wegführung, wodurch die Orientierung erschwert ist.
              </option>
              <option value="1.0">
                Bauliche Anlagen und/oder topographische Gegebenheiten erlauben eine übersichtliche
                Wegführung; die Orientierung ist gut.
              </option>
            </select>
          </div>

          <!-- Ein-/Auslass -->
          <div class="mb-3">
            <label class="form-label required" for="veranstaltungsgelaende_einlass_auslass">Ein- und Auslass</label>
            <select id="veranstaltungsgelaende_einlass_auslass" name="veranstaltungsgelaende_einlass_auslass" class="form-select" required>
              <option value="">Bitte wählen…</option>
              <option value="1.0">
                Ein‑ und Auslass sind räumlich getrennt; klare Strömungsrichtungen unterstützen
                einen geordneten Ablauf.
              </option>
              <option value="1.1">
                Ein‑ und Auslass sind räumlich nicht getrennt; Begegnungsströme können den Ablauf
                verlangsamen und Verdichtung fördern.
              </option>
            </select>
          </div>

        </div>
      </div>

      <!-- Gestalt -->
      <div class="tab-pane fade" id="tab-gestalt">
        <div class="card p-4">
          <div class="mb-3">
            <label class="form-label required" for="gestalt_grundform">Grundform der Veranstaltungsfläche</label>
            <select id="gestalt_grundform" name="gestalt_grundform" class="form-select" required>
              <option value="">Bitte wählen…</option>
              <option value="1.0">
                Muster: Szenen‑/Attraktionsfläche und Publikumsfläche sind getrennt; das
                unterstützt eine geordnete Besucherführung.
              </option>
              <option value="1.1">
                Vieleck: mehrere Szenenflächen/Attraktionen mit wechselnden Besucherströmen;
                komplexere Bewegungsmuster möglich.
              </option>
              <option value="1.2">
                Aufzug: veränderliche Szenenfläche/Attraktion bei statischer Publikumsfläche;
                Treffpunkte können sich im Verlauf verlagern.
              </option>
              <option value="1.3">
                Marktplatz: keine Trennung von Szenen‑/Attraktionsfläche und Publikumsfläche;
                offene, frei gestaltete Bewegungsflächen.
              </option>
            </select>
          </div>
        </div>
      </div>

      <!-- Beschaffenheit -->
      <div class="tab-pane fade" id="tab-beschaffenheit">
        <div class="card p-4">

          <!-- Entlastungsflächen -->
          <div class="mb-3">
            <label class="form-label required" for="beschaffenheit_entlastungsflaechen"
                   data-bs-toggle="tooltip" title="Zusätzliche Flächen, auf die sich Besuchendenströme bei Bedarf verteilen können.">
              Möglichkeit zur Einrichtung von Entlastungsflächen
            </label>
            <select id="beschaffenheit_entlastungsflaechen" name="beschaffenheit_entlastungsflaechen" class="form-select" required>
              <option value="">Bitte wählen…</option>
              <option value="1.0">
                Es bestehen Möglichkeiten zur Einrichtung von Entlastungsflächen; dadurch können
                Besuchendenströme im Bedarfsfall gezielt entzerrt werden.
              <option value="1.1">
                Es bestehen keine realistischen Möglichkeiten für Entlastungsflächen; Ausweichräume
                sind begrenzt.
              </option>
            </select>
          </div>

          <!-- Befestigung -->
          <div class="mb-3">
            <label class="form-label required" for="beschaffenheit_befestigung"
                   data-bs-toggle="tooltip" title="Relevanz für Zugänglichkeit, Logistik und Einsatzfahrzeuge.">
              Befestigter Grund mit befahrbaren Wegen
            </label>
            <select id="beschaffenheit_befestigung" name="beschaffenheit_befestigung" class="form-select" required>
              <option value="">Bitte wählen…</option>
              <option value="1.0">
                Der Untergrund ist befestigt und befahrbar; Logistik und Einsatzfahrzeuge können
                sich zuverlässig bewegen.
              </option>
              <option value="1.1">
                Der Untergrund ist nicht befestigt; Mobilität und Zugänglichkeit können eingeschränkt
                sein (insbesondere bei Nässe).
              </option>
            </select>
          </div>

          <!-- Wetterlage -->
          <div class="mb-3">
            <label class="form-label required" for="beschaffenheit_wetterlage"
                   data-bs-toggle="tooltip" title="Einfluss von Regen, Wind, Bodenbeschaffenheit u. Ä.">
              Wetterlage
            </label>
            <select id="beschaffenheit_wetterlage" name="beschaffenheit_wetterlage" class="form-select" required>
              <option value="">Bitte wählen…</option>
              <option value="1.3">
                Die Wetterlage kann die Nutzbarkeit des Geländes stark beeinflussen (z. B. durch
                Regen, Wind oder aufgeweichten Boden).
              </option>
              <option value="1.0">
                Die Wetterlage beeinflusst die Nutzbarkeit des Geländes nicht in relevantem Maße.
              </option>
            </select>
          </div>

        </div>
      </div>

      <!-- Veranstaltungsverlauf -->
      <div class="tab-pane fade" id="tab-verlauf">
        <div class="card p-4">

          <!-- Einlasskontrolle -->
          <div class="mb-3">
            <label class="form-label required" for="veranstaltungsverlauf_einlasskontrolle">Einlasskontrolle</label>
            <select id="veranstaltungsverlauf_einlasskontrolle" name="veranstaltungsverlauf_einlasskontrolle" class="form-select" required>
              <option value="">Bitte wählen…</option>
              <option value="1.3">
                Es erfolgt keine Einlasskontrolle; der Zugang ist frei und unreguliert,
                was schnelleres Einströmen, aber weniger Steuerung bedeutet.
              </option>
              <option value="1.0">
                Es erfolgt eine Einlasskontrolle; der Eintritt ist geordnet, zeitweise können
                Wartezonen entstehen.
              </option>
            </select>
          </div>

          <!-- Zu-/Ablauf -->
          <div class="mb-3">
            <label class="form-label required" for="veranstaltungsverlauf_zuablauf">Zu‑ und Ablauf bei Ein‑ und Auslass</label>
            <select id="veranstaltungsverlauf_zuablauf" name="veranstaltungsverlauf_zuablauf" class="form-select" required>
              <option value="">Bitte wählen…</option>
              <option value="1.0">
                Der Zu‑ und Ablauf erfolgt kontinuierlich; gleichmäßige Personenströme sind zu erwarten.
              <option value="1.3">
                Der Zu‑ und Ablauf erfolgt in einem oder mehreren Schüben; zeitweise Verdichtungen
                sind möglich.
              </option>
            </select>
          </div>

          <!-- Attraktionen -->
          <div class="mb-3">
            <label class="form-label required" for="veranstaltungsverlauf_attraktionen">Attraktionen / Bühnen</label>
            <select id="veranstaltungsverlauf_attraktionen" name="veranstaltungsverlauf_attraktionen" class="form-select" required>
              <option value="">Bitte wählen…</option>
              <option value="1.2">
                Es existieren mehrere Attraktionen bzw. Bühnen; die Ströme verteilen sich, bleiben aber dynamisch.
              </option>
              <option value="1.0">
                Es existiert nur eine Attraktion bzw. Bühne; der Personenfluss konzentriert sich stärker
                auf einen Bereich.
            </select>
          </div>

        </div>
      </div>

      <!-- Wiederkehrende Veranstaltung -->
      <div class="tab-pane fade" id="tab-wiederkehr">
        <div class="card p-4">

          <!-- Erfahrung -->
          <div class="mb-3">
            <label class="form-label required" for="wiederkehrende_veranstaltung_erfahrung">Erfahrung des Veranstaltenden</label>
            <select id="wiederkehrende_veranstaltung_erfahrung" name="wiederkehrende_veranstaltung_erfahrung" class="form-select" required>
              <option value="">Bitte wählen…</option>
              <option value="1.0">
                Die Veranstaltung ist wiederkehrend; Veranstaltende, Veranstaltungsort und Veranstaltungsablauf
                sind gleichbleibend (Prozesse sind erprobt).
              <option value="5.0">
                Die Veranstaltung findet mit dem Veranstaltungsablauf erstmalig an dem Veranstaltungsort
                statt; Veranstaltende sind mit vergleichbaren Veranstaltungen vertraut.
              <option value="10.0">
                Die Veranstaltung findet erstmalig an dem Veranstaltungsort statt; Veranstaltende sind
                mit derartigen Veranstaltungen bislang nicht vertraut.
            </select>
          </div>

          <!-- Historische Störungen -->
          <div class="mb-3">
            <label class="form-label required" for="wiederkehrende_veranstaltung_stoerungen">Historische Störungen (wiederkehrend)</label>
            <select id="wiederkehrende_veranstaltung_stoerungen" name="wiederkehrende_veranstaltung_stoerungen" class="form-select" required>
              <option value="">Bitte wählen…</option>
              <option value="0.0">
                Bei früheren Veranstaltungen kam es zu keinen dokumentierten Störungen. Anzahl und Umfang
                der Einsätze des Sanitätsdienstes, Sicherheits-/Ordnungsdienstes oder der BOS entsprachen
                den gängigen Einsatzzahlen.
              <option value="5.0">
                Bei früheren Veranstaltungen kam es zu dokumentierten Störungen. Anzahl und Umfang der
                Einsätze entsprachen nicht den gängigen Einsatzzahlen.
              </option>
            </select>
          </div>

        </div>
      </div>

      <!-- Besuchendenverhalten -->
      <div class="tab-pane fade" id="tab-verhalten">
        <div class="card p-4">

          <!-- Orts-/Ablaufkenntnis -->
          <div class="mb-3">
            <label class="form-label required" for="besuchendenverhalten_ort_ablauf">Ortskenntnis & Ablaufkenntnis</label>
            <select id="besuchendenverhalten_ort_ablauf" name="besuchendenverhalten_ort_ablauf" class="form-select" required>
              <option value="">Bitte wählen…</option>
              <option value="0.8">
                Die Mehrheit der erwarteten Besuchenden ist ortskundig; der Veranstaltungsablauf ist
                den Besuchenden bekannt.
              </option>
              <option value="1.2">
                Die Mehrheit der erwarteten Besuchenden ist ortsunkundig.
              <option value="1.3">
                Die Mehrheit der erwarteten Besuchenden ist ortskundig; der Veranstaltungsablauf ist
                den Besuchenden unbekannt.
              </option>
            </select>
          </div>

          <!-- Involvement -->
          <div class="mb-3">
            <label class="form-label required" for="besuchendenverhalten_involvement">Involvement (Bindung/Engagement)</label>
            <select id="besuchendenverhalten_involvement" name="besuchendenverhalten_involvement" class="form-select" required>
              <option value="">Bitte wählen…</option>
              <option value="1.2">
                Ein größerer Anteil der erwarteten Besuchenden hat ein hohes Involvement
                (aktivere Teilnahme/Bewegung möglich).
              </option>
              <option value="1.0">
                Nur ein kleiner Anteil der erwarteten Besuchenden hat ein hohes Involvement;
                das Gesamtverhalten bleibt eher ruhig.
            </select>
          </div>

          <!-- Soziale Gruppen -->
          <div class="mb-3">
            <label class="form-label required" for="besuchendenverhalten_soziale_gruppen">Besondere soziale Gruppen</label>
            <select id="besuchendenverhalten_soziale_gruppen" name="besuchendenverhalten_soziale_gruppen" class="form-select" required>
              <option value="">Bitte wählen…</option>
              <option value="1.2">
                Besondere soziale Gruppen sind zu erwarten, die die durchschnittliche Bewegungsgeschwindigkeit
                verändern (z. B. Jugendgruppen, Senior:innen, Familien).
              </option>
              <option value="1.0">
                Es sind keine besonderen sozialen Gruppen zu erwarten; die durchschnittliche
                Bewegungsgeschwindigkeit bleibt voraussichtlich normal.
            </select>
          </div>

        </div>
      </div>

      <!-- Ergebnis -->
      <div class="tab-pane fade" id="tab-ergebnis">
        <div class="card mt-0">
          <div class="card-body">
            <h5 class="card-title mb-3">Ergebnis</h5>
            <div class="alert alert-info mb-0" id="ergebnis_feld" aria-live="polite">
              <strong>0.00</strong>
            </div>
          </div>
        </div>
      </div>

    </div>

    <div class="d-flex gap-2 mt-4">
      <button class="btn btn-primary" type="submit">Absenden</button>
      <button class="btn btn-outline-secondary" type="reset">Zurücksetzen</button>
    </div>
  </form>
</div>

<!-- Modal: fehlende Angaben -->
<div class="modal fade" id="validationModal" tabindex="-1" aria-labelledby="validationModalLabel" aria-hidden="true">
  <div class="modal-dialog"><div class="modal-content">
    <div class="modal-header">
      <h5 class="modal-title" id="validationModalLabel">Es fehlen Angaben</h5>
      <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Schließen"></button>
    </div>
    <div class="modal-body">
      Bitte treffen Sie zunächst in allen Pflichtfeldern eine Auswahl:
      <ul class="mt-3 missing-list" id="missingList"></ul>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" data-bs-dismiss="modal">OK</button>
    </div>
  </div></div>
</div>

<!-- Bootstrap 5 (JS) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

<!-- Berechnung + Gating -->
<script>
(() => {
  const get = (id) => document.getElementById(id);
  const $$  = (sel, root=document) => Array.from(root.querySelectorAll(sel));

  function factor(id) {
    const v = parseFloat(get(id)?.value);
    return Number.isFinite(v) ? v : null;
  }
  const product = (ids) => ids.reduce((a, id) => a * (factor(id) ?? 1), 1);
  const sum     = (ids) => ids.reduce((a, id) => a + (factor(id) ?? 0), 0);

  // P (Excel-Äquivalent): 0 -> 1, sonst log2(n)
  function person() {
    const n = parseFloat(get("grunddaten_personenzahl").value) || 0;
    return n === 0 ? 1 : Math.log2(n);
  }

  // IDs je Kategorie
  const VG = [
    "veranstaltungsgelaende_flaechenverhaeltnis",
    "veranstaltungsgelaende_verkehrsstaerke",
    "veranstaltungsgelaende_stoerungen",
    "veranstaltungsgelaende_wegfuehrung",
    "veranstaltungsgelaende_einlass_auslass"
  ];
  const G  = [ "gestalt_grundform" ];
  const B  = [
    "beschaffenheit_entlastungsflaechen",
    "beschaffenheit_befestigung",
    "beschaffenheit_wetterlage"
  ];
  const VV = [
    "veranstaltungsverlauf_einlasskontrolle",
    "veranstaltungsverlauf_zuablauf",
    "veranstaltungsverlauf_attraktionen"
  ];
  const BV = [
    "besuchendenverhalten_ort_ablauf",
    "besuchendenverhalten_involvement",
    "besuchendenverhalten_soziale_gruppen"
  ];
  const EW = [
    "wiederkehrende_veranstaltung_erfahrung",
    "wiederkehrende_veranstaltung_stoerungen"
  ];

  function calc() {
    const left  = person() * product(VG) * product(G) * product(B) * product(VV);
    const right = sum(EW) * product(BV);     // ((E+W) × BV)
    const res   = left + right;
    get("ergebnis_feld").innerHTML = "<strong>" + res.toFixed(2) + "</strong>";
  }

  // Pflichtfelder prüfen (select[required] + input[required])
  function getMissingRequired() {
    const requiredFields = $$("select[required], input[required]");
    return requiredFields.filter(el => !el.value || el.value === "");
  }

  function showMissingModal(missing) {
    const list = get("missingList");
    list.innerHTML = "";
    missing.forEach(el => {
      const id = el.id;
      const label = document.querySelector(`label[for="${id}"]`)?.innerText || id;
      const li = document.createElement("li");
      li.textContent = label.replace(/\s*\*$/, "").trim();
      list.appendChild(li);
    });
    new bootstrap.Modal(get("validationModal")).show();
  }

  const form = get("matrixForm");
  form.addEventListener("change", (e) => {
    if (e.target.tagName === "SELECT" || e.target.type === "number") {
      // optisches Feedback
      const val = e.target.value;
      e.target.classList.remove("is-valid","is-invalid");
      e.target.classList.add(val ? "is-valid" : "is-invalid");
      calc();
    }
  });

  // Ergebnis-Tab nur bei vollständigen Eingaben zulassen
  const tabs = get("mainTabs");
  tabs.addEventListener("show.bs.tab", (e) => {
    const target = e.target.getAttribute("data-bs-target");
    if (target === "#tab-ergebnis") {
      const missing = getMissingRequired();
      if (missing.length > 0) {
        e.preventDefault();
        showMissingModal(missing);
      } else {
        calc(); // sicherheitshalber frisch rechnen
      }
    }
  });

  // Reset → zurücksetzen
  form.addEventListener("reset", () => {
    get("ergebnis_feld").innerHTML = "<strong>0.00</strong>";
    $$("select,input").forEach(el => el.classList.remove("is-valid","is-invalid"));
  });

  // Tooltips aktivieren
  $$('[data-bs-toggle="tooltip"]').forEach(el => new bootstrap.Tooltip(el));

  // Optional: initial rechnen
  // calc();
})();
</script>

<!-- Optional: Submit verhindern (Demo) -->
<script>
document.getElementById('matrixForm').addEventListener('submit', (e) => {
  e.preventDefault();
});
</script>
